<!DOCTYPE html>
<html>
<head>
    <title>Button Test</title>
</head>
<body>
    <h1>Button Test Page</h1>
    <p>Test if buttons work at all:</p>
    
    <button onclick="alert('Button clicked!')">Click Me</button>
    
    <br><br>
    
    <a href="javascript:alert('Link clicked!')">Click This Link</a>
    
    <br><br>
    
    <form>
        <input type="submit" value="Submit Form">
    </form>
    
    <br><br>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('result').innerHTML = 'JavaScript is working!';
    </script>
</body>
</html>
